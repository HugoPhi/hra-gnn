extends: base.yaml

dataset:
  name: HDFS
  kind: packed
  root: data/ProcessedData_HDFS
  feature_dim: 8
  num_node_types: 1
  num_edge_types: 3
  split:
    mode: provided
    train_file: train_ids.txt
    validation_file: validation_ids.txt
    test_file: test_ids.txt

training:
  batch_size: 64
  learning_rate: 0.0001

augmentation:
  methods:
    - edge_perturbation
    - node_type_swap
