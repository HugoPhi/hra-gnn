name: main_table_missing_hdfs
base_config: ../hdfs.yaml
seeds: [11, 22, 33]

common:
  experiment:
    stage: first_main_table_not_final
  training:
    epochs: 10
    early_stopping_patience: 3
  evaluation:
    score_mode: svdd
    sampling: seeded_stratified

variants:
  HGT-reimplemented:
    model:
      architecture: hgt
    ssl:
      enabled: false
  HRGCN:
    model:
      architecture: hrgcn
      relation_fusion: static_concat
      readout: max
  HRA-GNN:
    model:
      architecture: hra
      relation_fusion: deviation_attention
      readout: hybrid
