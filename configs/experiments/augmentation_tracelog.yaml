name: augmentation_tracelog
base_config: ../tracelog.yaml
seeds: [11, 22, 33, 44, 55]

variants:
  no_ssl:
    ssl:
      enabled: false
  edge_perturbation:
    augmentation:
      methods: [edge_perturbation]
  edge_addition:
    augmentation:
      methods: [edge_addition]
  node_type_swap:
    augmentation:
      methods: [node_type_swap]
  edge_type_swap:
    augmentation:
      methods: [edge_type_swap]
  topology_only:
    augmentation:
      methods: [edge_perturbation, edge_addition]
  type_only:
    augmentation:
      methods: [node_type_swap, edge_type_swap]
  full:
    {}
