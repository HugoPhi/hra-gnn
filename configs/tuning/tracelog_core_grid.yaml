name: tracelog_core_grid
base_config: ../tracelog.yaml
results_root: artifacts/results/hyperparameter_search
seeds: [11]

common:
  experiment:
    stage: hyperparameter_screening_validation_only
    final_evaluation_split: validation
  training:
    epochs: 8
    max_train_graphs: 2000
    batch_size: 16
    early_stopping_patience: 3
    checkpoint_metric: auc_ap_mean
  evaluation:
    max_graphs: 4000
    batch_size: 16
    sampling: seeded_stratified

parameters:
  training.learning_rate: [0.00003, 0.0001, 0.0003, 0.001]
  model.deviation_weight: [0.0, 0.25, 0.5, 1.0, 2.0]
  ssl.loss_weight: [0.0, 0.001, 0.01, 0.1, 0.5]

selection:
  split: validation
  metric: auc_ap_mean
