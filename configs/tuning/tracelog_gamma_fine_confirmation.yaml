name: tracelog_gamma_fine_confirmation
base_config: ../tracelog.yaml
results_root: artifacts/results/hyperparameter_search
seeds: [11, 22, 33, 44, 55]
retain_checkpoints: false

common:
  experiment:
    stage: hyperparameter_gamma_fine_five_seed
    final_evaluation_split: validation
  training:
    epochs: 8
    max_train_graphs: 2000
    batch_size: 16
    early_stopping_patience: 3
    checkpoint_metric: auc_ap_mean
  evaluation:
    max_graphs: 4000
    batch_size: 16
    sampling: seeded_stratified

parameters:
  training.learning_rate: [0.001]
  model.deviation_weight: [0.0, 0.05, 0.1, 0.25, 0.5]
  ssl.loss_weight: [0.01]
  model.attention_temperature: [1.0]
  model.prototype_momentum: [0.9]

selection:
  split: validation
  metric: auc_ap_mean
