name: tracelog_augmentation_confirmation
base_config: ../tracelog.yaml
results_root: artifacts/results/hyperparameter_search
seeds: [11, 22, 33, 44, 55]
retain_checkpoints: false

common:
  experiment:
    stage: hyperparameter_augmentation_five_seed
    final_evaluation_split: validation
  training:
    epochs: 8
    max_train_graphs: 2000
    batch_size: 16
    early_stopping_patience: 3
    checkpoint_metric: auc_ap_mean
  evaluation:
    max_graphs: 4000
    batch_size: 16
    sampling: seeded_stratified

trials:
  - &base
    training.learning_rate: 0.001
    model.deviation_weight: 0.0
    ssl.loss_weight: 0.01
    augmentation.edge_perturbation_rate: 0.13
    augmentation.edge_addition_rate: 0.13
    augmentation.node_type_swap_rate: 0.10
    augmentation.edge_type_swap_rate: 0.18
  - <<: *base
    augmentation.edge_perturbation_rate: 0.195
    augmentation.edge_addition_rate: 0.195
    augmentation.node_type_swap_rate: 0.15
    augmentation.edge_type_swap_rate: 0.27

selection:
  split: validation
  metric: auc_ap_mean
